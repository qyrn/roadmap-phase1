<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Soumettre — FrameCity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">Frame<span>City</span></a>
    <nav>
      <a href="/gallery.html">Galerie</a>
      <a href="/submit.html">Soumettre</a>
      <a href="/about.html">À propos</a>
      <a href="/account.html">Mon compte</a>
    </nav>
  </header>

  <main>
    <div class="card" style="max-width:520px">
      <h1>Soumettre une photo</h1>
      <p>Les soumissions sont évaluées par notre équipe avant publication.</p>

      <div id="submit-result"></div>

      <form id="submit-form" onsubmit="submitPhoto(event)">
        <input type="text" name="title" placeholder="Titre de la photo" required>
        <input type="text" name="location" placeholder="Lieu (ex : Paris, 11e)">
        <textarea name="description" rows="3" placeholder="Description (optionnel)"></textarea>
        <input type="hidden" name="score" value="3">
        <button type="submit" class="btn">Envoyer</button>
      </form>
    </div>
  </main>

  <footer>FrameCity &copy; 2024</footer>

  <script>
    async function submitPhoto(e) {
      e.preventDefault();
      const form = document.getElementById('submit-form');
      const formData = new FormData(form);

      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: formData.get('title'),
          location: formData.get('location'),
          description: formData.get('description'),
          score: formData.get('score')
        })
      });

      const data = await res.json();
      document.getElementById('submit-result').innerHTML =
        '<div class="alert alert-success">' +
        (data.flag ? '<strong>' + data.flag + '</strong>' : data.message) +
        '</div>';
    }
  </script>
</body>
</html>
